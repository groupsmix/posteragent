name = "nexus-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
node_compat = true
migrations_dir = "../../migrations"

# NOTE: The 15-step workflow runs via ctx.waitUntil() inside the fetch
# handler (see apps/nexus-api/src/services/workflow-engine.ts). We do NOT
# currently use a Cloudflare Workflows binding — that would require a
# WorkflowEntrypoint export, which we're deferring until the workflow
# needs to outlive a single request (currently ≤ 3 min for 15 AI calls).

# ================================
# D1 DATABASE
# ================================
[[d1_databases]]
binding = "DB"
database_name = "nexus-db"
database_id = "YOUR_D1_DATABASE_ID"

# ================================
# KV NAMESPACES
# ================================
[[kv_namespaces]]
binding = "CONFIG"
id = "YOUR_KV_ID"
preview_id = "YOUR_KV_PREVIEW_ID"

# ================================
# R2 BUCKETS
# ================================
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "nexus-assets"

# ================================
# CLOUDFLARE IMAGES (Workers AI binding)
# ================================
[images]
binding = "IMAGES"

# ================================
# SERVICE BINDINGS
# ================================
[[services]]
binding = "AI_WORKER"
service = "nexus-ai"

# ================================
# SECRETS STORE
# ================================
[secrets_store]
binding = "SECRETS"
store_id = "YOUR_SECRETS_STORE_ID"

# ================================
# SCHEDULED TRIGGERS (Trend Radar)
# ================================
[triggers]
crons = ["0 6 * * *"]  # Daily at 6am UTC


