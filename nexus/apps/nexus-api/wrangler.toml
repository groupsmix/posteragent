name = "nexus-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
node_compat = true

# ================================
# CLOUDFLARE WORKFLOWS
# ================================
[[workflows]]
name = "nexus-product-workflow"
binding = "PRODUCT_WORKFLOW"
class_name = "ProductWorkflow"

# ================================
# D1 DATABASE
# ================================
[[d1_databases]]
binding = "DB"
database_name = "nexus-db"
database_id = "YOUR_D1_DATABASE_ID"

# ================================
# KV NAMESPACES
# ================================
[[kv_namespaces]]
binding = "CONFIG"
id = "YOUR_KV_ID"
preview_id = "YOUR_KV_PREVIEW_ID"

# ================================
# R2 BUCKETS
# ================================
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "nexus-assets"

# ================================
# CLOUDFLARE IMAGES
# ================================
[[images]]
binding = "IMAGES"

# ================================
# SERVICE BINDINGS
# ================================
[[services]]
binding = "AI_WORKER"
service = "nexus-ai"
environment = "production"

# ================================
# SECRETS STORE
# ================================
[secrets_store]
binding = "SECRETS"
store_id = "YOUR_SECRETS_STORE_ID"

# ================================
# SCHEDULED TRIGGERS (Trend Radar)
# ================================
[triggers]
crons = ["0 6 * * *"]  # Daily at 6am UTC

# ================================
# BUILD CONFIGURATION
# ================================
[build]
command = "pnpm build"
cwd = "../.."

[build.upload]
format = "service-worker"
main = "src/index.ts"

# ================================
# TYPESCRIPT CONFIG
# ================================
[typescript]
strict = true

# ================================
# TAILWIND CSS (for potential SSR)
# ================================
# [assets]
# include = ["**/*.css"]
