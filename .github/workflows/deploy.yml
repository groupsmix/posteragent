name: Deploy

on:
  push:
    branches: [main]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: nexus/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Install wrangler
        run: npm install -g wrangler@3

      # Build frontend using next-on-pages
      - name: Build frontend
        run: pnpm --filter web pages:build
        env:
          NEXT_PUBLIC_API_URL: https://nexus-api.professional-inbox-simo.workers.dev

      # Deploy nexus-ai worker
      - name: Deploy nexus-ai
        run: wrangler deploy
        working-directory: nexus/apps/nexus-ai

      # Deploy nexus-api worker
      - name: Deploy nexus-api
        run: wrangler deploy
        working-directory: nexus/apps/nexus-api

      # Deploy frontend to Cloudflare Pages
      - name: Deploy frontend
        run: wrangler pages deploy .vercel/output/static --project-name nexus-web-cl2
        working-directory: nexus/apps/web

      # Run D1 migrations (continue on error — some may already be applied)
      - name: Run D1 migrations
        run: wrangler d1 migrations apply nexus-db --remote || echo "Some migrations may have already been applied"
        working-directory: nexus/apps/nexus-api
